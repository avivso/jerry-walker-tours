  <script>
    (function () {
      var wa = "https://wa.me/972504981145?text=" + encodeURIComponent("שלום ג'רי! הגעתי דרך הבלוג ואשמח לפרטים על סיור בפריז 🙂");
      var b = document.getElementById("waBtn"); if (b) b.href = wa;
      var f = document.getElementById("waFloat"); if (f) f.href = wa;
      document.getElementById("year").textContent = new Date().getFullYear();
      JWBlog.load().then(function (posts) {
        var el = document.getElementById("posts");
        if (!posts.length) { el.innerHTML = '<p class="blog-empty">הכתבות בדרך. בקרוב יעלו כאן הסיפורים שכתבתי על פריז.</p>'; return; }
        el.innerHTML = posts.map(function (p) {
          return '<article class="post" id="' + p.id + '">'
            + '<h2>' + JWBlog.esc(p.title) + '</h2>'
            + (p.date ? '<div class="post-date">' + JWBlog.esc(p.date) + '</div>' : '')
            + '<div class="post-body">' + p.html + '</div></article>';
        }).join("");
        if (location.hash) { var t = document.getElementById(location.hash.slice(1)); if (t) t.scrollIntoView(); }
      });
    })();
  </script>

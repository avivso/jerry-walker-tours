  <script src="assets/js/blog.js?v=26"></script>
  <script>
    (function () {
      var I18N = {
        he: {
          title: "בלוג · ג'רי ווקר | סיפורים מפריז",
          kicker: "בלוג · ג'רי ווקר", h1: "סיפורים מפריז",
          sub: "כתבות, סיפורים וטיפים שכתבתי על פריז.",
          back: "→ חזרה לאתר", wa: "שריינו סיור",
          empty: "הכתבות בדרך. בקרוב יעלו כאן הסיפורים שכתבתי על פריז.",
          waText: "שלום ג'רי! הגעתי דרך הבלוג ואשמח לפרטים על סיור בפריז 🙂"
        },
        en: {
          title: "Blog · Jerry Walker | Stories from Paris",
          kicker: "Blog · Jerry Walker", h1: "Stories from Paris",
          sub: "Articles, stories and tips I've written about Paris.",
          back: "← Back to the site", wa: "Book a tour",
          empty: "Posts are on the way. My Paris stories will appear here soon.",
          waText: "Hi Jerry! I found you through the blog and would love details about a Paris tour 🙂"
        }
      };
      var LANG = localStorage.getItem("jw_lang") || "he";
      var $ = function (id) { return document.getElementById(id); };

      function renderPosts() {
        JWBlog.load(LANG).then(function (posts) {
          var el = $("posts");
          if (!posts.length) { el.innerHTML = '<p class="blog-empty">' + I18N[LANG].empty + '</p>'; return; }
          el.innerHTML = posts.map(function (p) {
            return '<article class="post" id="' + p.id + '">'
              + '<h2>' + JWBlog.esc(p.title) + '</h2>'
              + (p.date ? '<div class="post-date">' + JWBlog.esc(p.date) + '</div>' : '')
              + '<div class="post-body">' + p.html + '</div></article>';
          }).join("");
          if (location.hash) { var t = document.getElementById(location.hash.slice(1)); if (t) setTimeout(function () { t.scrollIntoView(); }, 60); }
        });
      }

      function applyLang() {
        var d = I18N[LANG];
        document.documentElement.lang = LANG;
        document.documentElement.dir = LANG === "he" ? "rtl" : "ltr";
        document.title = d.title;
        $("blogKicker").textContent = d.kicker;
        $("blogTitle").textContent = d.h1;
        $("blogSub").textContent = d.sub;
        $("backHome").textContent = d.back;
        $("waLabel").textContent = d.wa;
        var wa = "https://wa.me/972504981145?text=" + encodeURIComponent(d.waText);
        if ($("waBtn")) $("waBtn").href = wa;
        if ($("waFloat")) $("waFloat").href = wa;
        renderPosts();
      }

      $("year").textContent = new Date().getFullYear();
      var toggle = $("langToggle");
      if (toggle) toggle.addEventListener("click", function () {
        LANG = LANG === "he" ? "en" : "he";
        localStorage.setItem("jw_lang", LANG);
        applyLang();
      });
      applyLang();
    })();
  </script>
